<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

header {
    background: #111;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 { font-weight: 500; }

.logout-btn {
    background: #ff4d4d;
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
}

#chatIcon {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    background: #007bff;
    color: white;
    font-size: 26px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

#chatBadge {
    position: absolute;
    top: -5px;
    right: -5px;
    background: red;
    color: white;
    font-size: 12px;
    padding: 4px 7px;
    border-radius: 50%;
    display: none;
}

#chatPanel {
    position: fixed;
    bottom: 100px;
    right: 25px;
    width: 700px;
    height: 420px;
    background: white;
    display: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    border-radius: 10px;
    overflow: hidden;
    flex-direction: row;
}

#userList {
    width: 30%;
    background: #f2f2f2;
    border-right: 1px solid #ddd;
    overflow-y: auto;
}

.user {
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
}

.user:hover { background: #e6e6e6; }

.user-badge {
    background: red;
    color: white;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 50%;
}

#chatWindow {
    width: 70%;
    display: flex;
    flex-direction: column;
}

#chatHeader {
    padding: 12px;
    background: #007bff;
    color: white;
}

#messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.message {
    max-width: 70%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.user-msg {
    background: #e0e0e0;
    align-self: flex-start;
}

.admin-msg {
    background: #007bff;
    color: white;
    align-self: flex-end;
}

#inputArea {
    display: flex;
    border-top: 1px solid #ddd;
}

#inputArea input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

#inputArea button {
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h2>Leisure Admin Dashboard</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div id="chatIcon">
    💬
    <div id="chatBadge"></div>
</div>

<div id="chatPanel">
    <div id="userList"></div>

    <div id="chatWindow">
        <div id="chatHeader">Select a user</div>
        <div id="messages"></div>
        <div id="inputArea">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
let users = {};
let activeUser = null;
let totalUnread = 0;

const chatIcon = document.getElementById("chatIcon");
const chatPanel = document.getElementById("chatPanel");
const userList = document.getElementById("userList");
const messagesDiv = document.getElementById("messages");
const chatHeader = document.getElementById("chatHeader");
const badge = document.getElementById("chatBadge");

chatIcon.onclick = () => {
    chatPanel.style.display = chatPanel.style.display === "flex" ? "none" : "flex";
};

const socket = new WebSocket("ws://localhost:8080/chat?role=receiver");

socket.onopen = () => {
    console.log("Admin connected (Receiver)");
};

socket.onmessage = (event) => {
    const [senderId, text] = event.data.split("::");

    if (!users[senderId]) {
        users[senderId] = { messages: [], unread: 0 };
    }

    users[senderId].messages.push({ from: "user", text });

    if (activeUser !== senderId) {
        users[senderId].unread++;
        totalUnread++;
    }

    renderUsers();
    if (activeUser === senderId) renderMessages(senderId);
};

function renderUsers() {
    userList.innerHTML = "";
    Object.keys(users).forEach(id => {
        const div = document.createElement("div");
        div.className = "user";
        div.innerHTML = `
            ${id.substring(0,8)}
            ${users[id].unread ? `<span class="user-badge">${users[id].unread}</span>` : ""}
        `;
        div.onclick = () => openChat(id);
        userList.appendChild(div);
    });
}

function openChat(senderId) {
    activeUser = senderId;
    users[senderId].unread = 0;
    chatHeader.innerText = "Chat with " + senderId.substring(0,8);
    renderMessages(senderId);
    updateBadge();
    renderUsers();
}

function renderMessages(senderId) {
    messagesDiv.innerHTML = "";
    users[senderId].messages.forEach(m => {
        const div = document.createElement("div");
        div.className = "message " + (m.from === "admin" ? "admin-msg" : "user-msg");
        div.innerText = m.text;
        messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    if (!input.value || !activeUser) return;

    socket.send(activeUser + "::" + input.value);
    users[activeUser].messages.push({ from: "admin", text: input.value });
    input.value = "";
    renderMessages(activeUser);
}

function updateBadge() {
    badge.style.display = totalUnread ? "block" : "none";
    badge.innerText = totalUnread;
}

function logout() {
    fetch("/admin/logout", { method: "POST" })
        .then(() => window.location.href = "/login.html");
}
</script>

</body>
</html>
