<!DOCTYPE html>
<html>
<body>

<h2>Receiver</h2>
<div id="chat"></div>

<input id="reply" placeholder="senderId::message">
<button onclick="send()">Reply</button>

<script>
  const ws = new WebSocket(
    "ws://localhost:8080/chat?role=receiver"
  );

  ws.onmessage = (event) => {
    document.getElementById("chat").innerHTML +=
      `<p>${event.data}</p>`;
  };

  function send() {
    ws.send(document.getElementById("reply").value);
    document.getElementById("reply").value = "";
  }
</script>

</body>
</html>
